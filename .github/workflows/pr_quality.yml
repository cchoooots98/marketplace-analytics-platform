name: pr_quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_quality:
    name: Python quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: pip install -r requirements.txt

      - name: Run repository lint checks
        run: python tasks.py lint

      - name: Check Python formatting
        run: python tasks.py format-check

  python_tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: pip install -r requirements.txt

      - name: Run Python test suite
        run: python tasks.py test

  dbt_contracts:
    name: dbt contracts
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: marketplace_analytics_dbt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: pip install -r ../requirements.txt

      - name: Install dbt packages
        run: dbt deps

      - name: Create temporary dbt profile
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-profile"
          cat <<'EOF' > "$RUNNER_TEMP/dbt-profile/profiles.yml"
          marketplace_analytics_dbt:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: ci-project
                dataset: ci_dataset
                threads: 1
                location: EU
                priority: interactive
                job_execution_timeout_seconds: 300
                job_retries: 1
          EOF

      - name: Parse dbt project
        run: >
          dbt parse
          --profiles-dir "$RUNNER_TEMP/dbt-profile"
          --target ci
          --no-partial-parse
          --target-path target_ci

      - name: Validate dashboard assets
        working-directory: .
        run: >
          python tasks.py dashboard-validate
          --manifest marketplace_analytics_dbt/target_ci/manifest.json

      - name: Clean dbt artifacts
        if: always()
        run: rm -rf target target_* logs

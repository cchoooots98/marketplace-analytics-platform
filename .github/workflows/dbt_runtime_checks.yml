name: warehouse_runtime_checks

on:
  workflow_dispatch:
    inputs:
      freshness_mode:
        description: "Warehouse freshness mode: static skips source freshness; runtime enforces source freshness SLAs."
        required: false
        default: static
        type: choice
        options:
          - static
          - runtime

jobs:
  runtime-checks:
    name: Warehouse runtime checks
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      BIGQUERY_LOCATION: ${{ secrets.BIGQUERY_LOCATION }}
      BQ_RAW_OLIST_DATASET: ${{ secrets.BQ_RAW_OLIST_DATASET }}
      BQ_RAW_EXT_DATASET: ${{ secrets.BQ_RAW_EXT_DATASET }}
      BQ_STAGING_DATASET: ${{ secrets.BQ_STAGING_DATASET }}
      BQ_INTERMEDIATE_DATASET: ${{ secrets.BQ_INTERMEDIATE_DATASET }}
      BQ_MARTS_DATASET: ${{ secrets.BQ_MARTS_DATASET }}
      BQ_SNAPSHOTS_DATASET: ${{ secrets.BQ_SNAPSHOTS_DATASET }}
      WAREHOUSE_FRESHNESS_MODE: ${{ inputs.freshness_mode || vars.WAREHOUSE_FRESHNESS_MODE || 'static' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check runtime configuration
        id: config
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ] || [ -z "${GCP_PROJECT_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Warehouse runtime checks are disabled because required repository secrets are not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        if: steps.config.outputs.enabled == 'true'
        run: pip install -r requirements.txt

      - name: Write service account key
        if: steps.config.outputs.enabled == 'true'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/gcp-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> "$GITHUB_ENV"
          cat <<'EOF' > "${GOOGLE_APPLICATION_CREDENTIALS}"
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Create dbt profile
        if: steps.config.outputs.enabled == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-profile"
          cat <<'EOF' > "$RUNNER_TEMP/dbt-profile/profiles.yml"
          marketplace_analytics_dbt:
            target: runtime
            outputs:
              runtime:
                type: bigquery
                method: service-account
                keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
                project: "{{ env_var('GCP_PROJECT_ID') }}"
                dataset: "{{ env_var('BQ_STAGING_DATASET', 'staging') }}"
                threads: 4
                location: "{{ env_var('BIGQUERY_LOCATION', 'EU') }}"
                priority: interactive
          EOF

      - name: Install dbt packages
        if: steps.config.outputs.enabled == 'true'
        working-directory: marketplace_analytics_dbt
        run: dbt deps

      - name: Run source freshness
        if: steps.config.outputs.enabled == 'true' && env.WAREHOUSE_FRESHNESS_MODE == 'runtime'
        working-directory: marketplace_analytics_dbt
        run: dbt source freshness --profiles-dir "$RUNNER_TEMP/dbt-profile" --target runtime --target-path target_runtime

      - name: Skip source freshness in static mode
        if: steps.config.outputs.enabled == 'true' && env.WAREHOUSE_FRESHNESS_MODE == 'static'
        run: echo "Skipping source freshness because WAREHOUSE_FRESHNESS_MODE=static."

      - name: Run snapshots
        if: steps.config.outputs.enabled == 'true'
        working-directory: marketplace_analytics_dbt
        run: dbt snapshot --select snap_sellers snap_products --profiles-dir "$RUNNER_TEMP/dbt-profile" --target runtime --target-path target_runtime

      - name: Run runtime dbt tests
        if: steps.config.outputs.enabled == 'true'
        working-directory: marketplace_analytics_dbt
        run: >
          dbt test
          --profiles-dir "$RUNNER_TEMP/dbt-profile"
          --target runtime
          --target-path target_runtime
          --select path:snapshots path:models/marts path:tests

      - name: Upload runtime dbt artifacts on failure
        if: failure() && steps.config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dbt-runtime-artifacts
          path: |
            marketplace_analytics_dbt/target_runtime/

      - name: Clean local dbt artifacts
        if: always() && steps.config.outputs.enabled == 'true'
        working-directory: marketplace_analytics_dbt
        run: rm -rf target target_* logs

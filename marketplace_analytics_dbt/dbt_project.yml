name: "marketplace_analytics_dbt"
version: "1.0.0"
config-version: 2

profile: "marketplace_analytics_dbt"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Project-level vars. Exposed as dbt vars so threshold tuning happens in one
# place and documentation / tests can cite the same value.
vars:
  # Low-review threshold for seller experience metrics. Scores at or below this
  # value count as low reviewed on the attributable seller-order subset. 2 is
  # the common detractor band on a 1..5 scale.
  low_review_score_threshold: 2
  # Shared currency-safe epsilon for order-value, mart, and line-item
  # reconciliation tests. Keeping this in vars avoids SQL/test/doc drift.
  reconciliation_amount_tolerance: 0.01
  # Shared floating-point epsilon for rate and average comparisons in dbt
  # tests. Keeping this in vars avoids duplicated literal thresholds.
  reconciliation_rate_tolerance: 0.000001
  # fact_orders uses a business-SLA replay window because Olist does not expose
  # a trustworthy row-level updated_at watermark for precise CDC-style pruning.
  fact_orders_incremental_lookback_days: 90

models:
  marketplace_analytics_dbt:
    # The custom generate_schema_name macro returns these custom schemas
    # directly, so models build into exact BigQuery datasets such as staging
    # instead of target_schema_staging.
    staging:
      +materialized: view
      +schema: "{{ env_var('BQ_STAGING_DATASET', 'staging') }}"
    intermediate:
      +materialized: view
      +schema: "{{ env_var('BQ_INTERMEDIATE_DATASET', 'intermediate') }}"
    marts:
      # The folder name is organizational. dim_* and fact_* models published
      # here are conformed warehouse contracts and may be reused by downstream
      # facts, post-conformed intermediates, and marts when that keeps a
      # business definition centralized.
      # Tables (not views) for marts: BI tools read them repeatedly, so paying the
      # build cost once beats recomputing every dashboard refresh.
      +materialized: table
      +schema: "{{ env_var('BQ_MARTS_DATASET', 'marts') }}"
      # Push dbt descriptions into BigQuery relation/column metadata so Metabase,
      # Looker, and the BigQuery console surface the same contract docs.
      +persist_docs:
        relation: true
        columns: true
      dimensions:
        +tags: ["marts", "dimension"]
      facts:
        +tags: ["marts", "fact"]
      aggregates:
        +tags: ["marts", "aggregate"]

snapshots:
  marketplace_analytics_dbt:
    +target_schema: "{{ env_var('BQ_SNAPSHOTS_DATASET', 'snapshots') }}"

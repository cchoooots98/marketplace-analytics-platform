x-airflow-common-environment: &airflow-common-environment
  PYTHONPATH: /opt/merchantpulse
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_DB_USER:-airflow}:${AIRFLOW_POSTGRES_DB_PASS:-airflow}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB_NAME:-airflow}
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__API__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
  AIRFLOW__FAB__BABEL_DEFAULT_LOCALE: en
  GOOGLE_APPLICATION_CREDENTIALS: ${AIRFLOW_GOOGLE_APPLICATION_CREDENTIALS:-/opt/merchantpulse/secrets/service-account.json}
  GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
  BIGQUERY_LOCATION: ${BIGQUERY_LOCATION:-EU}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  OLIST_DATA_DIR: ${OLIST_DATA_DIR:-data/olist}
  OLIST_LANDING_DIR: ${OLIST_LANDING_DIR:-data/olist_landing}
  BQ_RAW_OLIST_DATASET: ${BQ_RAW_OLIST_DATASET:-raw_olist}
  BQ_RAW_EXT_DATASET: ${BQ_RAW_EXT_DATASET:-raw_ext}
  BQ_STAGING_DATASET: ${BQ_STAGING_DATASET:-staging}
  BQ_INTERMEDIATE_DATASET: ${BQ_INTERMEDIATE_DATASET:-intermediate}
  BQ_MARTS_DATASET: ${BQ_MARTS_DATASET:-marts}
  BQ_SNAPSHOTS_DATASET: ${BQ_SNAPSHOTS_DATASET:-snapshots}
  NAGER_COUNTRY_CODE: ${NAGER_COUNTRY_CODE:-BR}
  OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
  OPENWEATHER_LATITUDE: ${OPENWEATHER_LATITUDE:--23.5505}
  OPENWEATHER_LONGITUDE: ${OPENWEATHER_LONGITUDE:--46.6333}
  OPENWEATHER_LOCATION_KEY: ${OPENWEATHER_LOCATION_KEY:-sao_paulo}
  OPENWEATHER_UNITS: ${OPENWEATHER_UNITS:-metric}
  OPENWEATHER_LANG: ${OPENWEATHER_LANG:-en}
  OPENWEATHER_TIMEZONE_OFFSET: ${OPENWEATHER_TIMEZONE_OFFSET:--03:00}
  OPENWEATHER_MAX_CALLS_PER_RUN: ${OPENWEATHER_MAX_CALLS_PER_RUN:-900}
  WEATHER_RUNTIME_LOOKBACK_DAYS: ${WEATHER_RUNTIME_LOOKBACK_DAYS:-7}
  INGESTION_STATE_TABLE: ${INGESTION_STATE_TABLE:-ops.ingestion_batch_state}
  DBT_PACKAGES_INSTALL_PATH: ${AIRFLOW_DBT_PACKAGES_INSTALL_PATH:-/opt/airflow/dbt_packages}

x-airflow-common-volumes: &airflow-common-volumes
  - ./:/opt/merchantpulse
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/logs:/opt/airflow/logs
  - ./airflow/config:/opt/airflow/config
  - ./airflow/plugins:/opt/airflow/plugins
  - ./secrets:/opt/merchantpulse/secrets:ro

x-airflow-common-service: &airflow-common-service
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: merchantpulse-airflow:local
  working_dir: /opt/merchantpulse
  environment: *airflow-common-environment
  volumes: *airflow-common-volumes

x-airflow-runtime-service: &airflow-runtime-service
  <<: *airflow-common-service
  restart: unless-stopped
  depends_on:
    airflow-postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB_NAME:-airflow}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_DB_PASS:-airflow}
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-5433}:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${AIRFLOW_POSTGRES_DB_USER:-airflow} -d ${AIRFLOW_POSTGRES_DB_NAME:-airflow}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common-service
    container_name: airflow-init
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
        airflow db migrate
        python3 /opt/merchantpulse/docker/airflow/create_admin_user.py

  airflow-api-server:
    <<: *airflow-runtime-service
    container_name: airflow-api-server
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    command: api-server
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import sys
          import urllib.request

          for url in (
              "http://localhost:8080/api/v2/monitor/health",
              "http://localhost:8080/health",
          ):
              try:
                  with urllib.request.urlopen(url, timeout=5):
                      sys.exit(0)
              except Exception:
                  pass

          sys.exit(1)
          PY
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  airflow-scheduler:
    <<: *airflow-runtime-service
    container_name: airflow-scheduler
    command: scheduler

  airflow-dag-processor:
    <<: *airflow-runtime-service
    container_name: airflow-dag-processor
    command: dag-processor

  airflow-triggerer:
    <<: *airflow-runtime-service
    container_name: airflow-triggerer
    command: triggerer

  metabase-postgres:
    image: postgres:16
    container_name: metabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${METABASE_DB_NAME:-metabaseappdb}
      POSTGRES_USER: ${METABASE_DB_USER:-metabase}
      POSTGRES_PASSWORD: ${METABASE_DB_PASS:-metabase}
    ports:
      - "${METABASE_DB_PORT:-5432}:5432"
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${METABASE_DB_USER:-metabase} -d ${METABASE_DB_NAME:-metabaseappdb}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  metabase:
    image: metabase/metabase:${METABASE_VERSION:-v0.50.36}
    container_name: metabase
    restart: unless-stopped
    depends_on:
      metabase-postgres:
        condition: service_healthy
    environment:
      MB_SITE_NAME: ${METABASE_SITE_NAME:-MerchantPulse}
      MB_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@example.com}
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabaseappdb}
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_DB_USER:-metabase}
      MB_DB_PASS: ${METABASE_DB_PASS:-metabase}
      MB_DB_HOST: metabase-postgres
      JAVA_TIMEZONE: ${METABASE_JAVA_TIMEZONE:-UTC}
    ports:
      - "${METABASE_PORT:-3000}:3000"

volumes:
  airflow_postgres_data:
  metabase_postgres_data:
